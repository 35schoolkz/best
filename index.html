<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 40px;
    margin-right: 10px;
}

/* MENU ПОД ЛОГО */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: #f9fafb;
    border-bottom: 1px solid #ddd;
}

.menu button {
    border: none;
    background: #e5e7eb;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    background: #d1d5db;
}

/* PAGES */
.page {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* SLIDER */
.slider {
    max-width: 700px;
    margin: 20px auto;
    position: relative;
}

.slide {
    width: 100%;
    height: 350px; /* фикс высота */
    object-fit: cover; /* делает ровно */
    display: none;
    border-radius: 12px;
}

.slide.active {
    display: block;
}

/* ARROWS */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* CONTENT */
.content {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

/* COMMENTS */
input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

button.send {
    margin-top: 10px;
    padding: 10px;
}
</style>

</head>
<body>

<header>
    <div class="logo">
        <img src="logo.jpg">
        <b>№35 Мектеп-лицейі</b>
    </div>
</header>

<!-- МЕНЮ -->
<div class="menu">
    <button onclick="openPage('home')">Басты бет</button>
    <button onclick="openPage('study')">Ақылды оқыту</button>
    <button onclick="openPage('safe')">Қауіпсіз мектеп</button>
    <button onclick="openPage('goal')">Бір мақсат</button>
    <button onclick="openPage('sport')">Спорт</button>
    <button onclick="openPage('comments')">Пікірлер</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

    <h1 style="text-align:center;">Зияткерлік мектептері</h1>

    <div class="slider">
        <img src="photo1.jpg" class="slide active">
        <img src="photo2.jpg" class="slide">
        <img src="photo3.jpg" class="slide">
        <img src="photo4.jpg" class="slide">

        <button class="prev" onclick="prev()">❮</button>
        <button class="next" onclick="next()">❯</button>
    </div>

</div>

<!-- PAGES -->
<div id="study" class="page">
    <div class="content">
        <h2>Ақылды оқыту</h2>
        <p>Заманауи технология арқылы білім беру.</p>
    </div>
</div>

<div id="safe" class="page">
    <div class="content">
        <h2>Қауіпсіз мектеп</h2>
        <p>Оқушылар үшін қауіпсіз орта.</p>
    </div>
</div>

<div id="goal" class="page">
    <div class="content">
        <h2>Бір мақсат</h2>
        <p>Барлығы бір мақсатта жұмыс істейді.</p>
    </div>
</div>

<div id="sport" class="page">
    <div class="content">
        <h2>Спорт</h2>
        <p>Спорттық жетістіктер.</p>
    </div>
</div>

<!-- COMMENTS -->
<div id="comments" class="page">
    <div class="content">
        <h2>Пікірлер</h2>

        <input id="name" placeholder="Атыңыз">
        <textarea id="text" placeholder="Пікір"></textarea>
        <button class="send" onclick="addComment()">Жіберу</button>

        <div id="list"></div>
    </div>
</div>

<script>
function openPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* SLIDER */
let i = 0;
let slides = document.querySelectorAll(".slide");

function show(n){
    slides.forEach(s => s.classList.remove("active"));
    slides[n].classList.add("active");
}

function next(){
    i = (i + 1) % slides.length;
    show(i);
}

function prev(){
    i = (i - 1 + slides.length) % slides.length;
    show(i);
}

setInterval(next, 3000);

/* COMMENTS */
function addComment(){
    let name = document.getElementById("name").value;
    let text = document.getElementById("text").value;

    let div = document.createElement("div");
    div.innerHTML = "<b>" + name + ":</b> " + text;

    document.getElementById("list").appendChild(div);
}
</script>

</body>
</html>
