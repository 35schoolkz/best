<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f7;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: white;
}

.menu button {
    padding: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
}

.page { display: none; padding: 20px; }
.active { display: block; }

/* SLIDER */
.slider {
    max-width: 600px;
    margin: auto;
    position: relative;
}

.slide {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: none;
    border-radius: 12px;
}

.slide.active {
    display: block;
}

/* SLIDER BUTTONS */
.btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: black;
    color: white;
    padding: 8px;
    cursor: pointer;
    border-radius: 50%;
}

.left { left: 10px; }
.right { right: 10px; }

/* LIST */
.item {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    cursor: pointer;
}

.gold { border-left: 6px solid gold; }
.silver { border-left: 6px solid silver; }
.bronze { border-left: 6px solid #cd7f32; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    top: 0;
}

.modal img {
    display: block;
    margin: 70px auto;
    max-width: 450px;
    width: 90%;
}

/* GALLERY ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

</style>
</head>
<body>

<div class="menu">
    <button onclick="openPage('home')">Басты бет</button>
    <button onclick="openPage('rating')">Үздіктер</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<h2 style="text-align:center;">№35 Мектеп-лицейі</h2>

<div class="slider">
    <img src="photo1.jpg" class="slide active">
    <img src="photo2.jpg" class="slide">
    <img src="photo3.jpg" class="slide">

    <div class="btn left" onclick="prevSlide()">❮</div>
    <div class="btn right" onclick="nextSlide()">❯</div>
</div>

</div>

<!-- RATING -->
<div id="rating" class="page">

<h2>🏆 Үздік оқушылар</h2>

<div class="item gold" onclick="openGallery('uldana')">🥇 Тәліпова Ұлдана</div>
<div class="item gold" onclick="openGallery('nuray')">🥇 Сәдуақас Нұрай</div>

<div class="item silver" onclick="openGallery('akerke')">🥈 Шерімқожа Ақерке</div>

<div class="item bronze" onclick="openGallery('nurislam')">🥉 Мейрамбеков Нұрислам</div>
<div class="item bronze" onclick="openGallery('merei')">🥉 Ақбергенова Мерей</div>

<h2>👨‍🏫 Үздік мұғалімдер</h2>

<div class="item" onclick="openGallery('aigerim')">Сағатова Айгерім</div>
<div class="item" onclick="openGallery('aigul')">Сулейменова Айгүл</div>
<div class="item" onclick="openGallery('zharyl')">Жарылқасынова Ақмарал</div>
<div class="item" onclick="openGallery('korganbay')">Қорғанбай Жансая</div>
<div class="item" onclick="openGallery('aizhan')">Жұмабекқызы Айжан</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">

<span class="arrow left" onclick="prevImg(event)">❮</span>
<span class="arrow right" onclick="nextImg(event)">❯</span>

<img id="img">

</div>

<script>
function openPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* SLIDER FIX */
let s = 0;
let slides = document.querySelectorAll(".slide");

function showSlide(){
    slides.forEach(el => el.classList.remove("active"));
    slides[s].classList.add("active");
}

function nextSlide(){
    s = (s + 1) % slides.length;
    showSlide();
}

function prevSlide(){
    s = (s - 1 + slides.length) % slides.length;
    showSlide();
}

/* GALLERY */
let galleries = {
    uldana: ["uldana1.jpeg","uldana2.jpeg"],
    nuray: ["nurai1.png","nurai2.png"], /* ВАЖНО */
    akerke: ["akerke1.jpeg"],
    nurislam: ["nurislam1.jpeg"],
    merei: ["merei1.jpeg"],

    aigerim: ["aigerim1.jpeg"],
    aigul: ["aigul1.jpeg"], /* ВАЖНО */
    zharyl: ["zharyl1.jpeg"],
    korganbay: ["korganbay1.jpeg"],
    aizhan: ["aizhan1.jpeg"]
};

let current = [];
let i = 0;

function openGallery(name){
    current = galleries[name];
    i = 0;
    document.getElementById("modal").style.display = "block";
    showImg();
}

function showImg(){
    document.getElementById("img").src = current[i];
}

function nextImg(e){
    e.stopPropagation();
    i = (i + 1) % current.length;
    showImg();
}

function prevImg(e){
    e.stopPropagation();
    i = (i - 1 + current.length) % current.length;
    showImg();
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
