<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Мектеп сайты</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: #1e293b;
    padding: 20px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.hero {
    padding: 20px;
}

.slider {
    position: relative;
    max-width: 1000px;
    margin: auto;
}

.slide {
    display: none;
    position: relative;
}

.slide img {
    width: 100%;
    border-radius: 10px;
}

.slide h2 {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 5px;
}

.active {
    display: block;
}

.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

section {
    padding: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 10px 0;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.comment {
    background: #334155;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h1>🏫 Менің мектебім</h1>
    <nav>
        <a href="#about">Мектеп туралы</a>
        <a href="#news">Жаңалықтар</a>
        <a href="#contact">Байланыс</a>
        <a href="#comments">Пікірлер</a>
    </nav>
</header>

<section class="hero">
    <div class="slider">

        <div class="slide active">
            <img src="https://picsum.photos/1200/400?1">
            <h2>Қош келдіңіз!</h2>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/1200/400?2">
            <h2>Біздің мектеп</h2>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/1200/400?3">
            <h2>Білім мен даму</h2>
        </div>

        <button class="prev" onclick="prevSlide()">❮</button>
        <button class="next" onclick="nextSlide()">❯</button>

    </div>
</section>

<section id="about">
    <h2>Мектеп туралы</h2>
    <div class="card">
        Бұл мектеп – білім мен тәрбиенің ордасы.
    </div>
</section>

<section id="news">
    <h2>Жаңалықтар</h2>
    <div class="card">📌 Жаңа кабинет ашылды</div>
    <div class="card">📌 Мектеп жарысы өтті</div>
</section>

<section id="contact">
    <h2>Байланыс</h2>
    <div class="card">
        📍 Қызылорда  
        <br>📞 +7 700 000 00 00
    </div>
</section>

<section id="comments">
    <h2>💬 Пікірлер</h2>

    <div class="card">
        <input id="name" placeholder="Атыңыз">
        <textarea id="text" placeholder="Пікір жазыңыз"></textarea>
        <button onclick="addComment()">Жіберу</button>
    </div>

    <div id="commentList"></div>
</section>

<script>
let index = 0;
let slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

setInterval(nextSlide, 3000);

function addComment() {
    let name = document.getElementById("name").value;
    let text = document.getElementById("text").value;

    if(name === "" || text === "") {
        alert("Барлық өрісті толтырыңыз!");
        return;
    }

    let div = document.createElement("div");
    div.className = "comment";
    div.innerHTML = "<b>" + name + ":</b><br>" + text;

    document.getElementById("commentList").appendChild(div);

    document.getElementById("name").value = "";
    document.getElementById("text").value = "";
}
</script>

</body>
</html>
