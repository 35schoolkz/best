<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: #f9fafb;
}

.menu button {
    padding: 10px;
    border: none;
    background: #e5e7eb;
    border-radius: 10px;
    cursor: pointer;
}

/* PAGES */
.page { display: none; padding: 20px; }
.active { display: block; }

/* LIST */
.item {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
}

/* COLORS */
.gold { border-left: 6px solid gold; }
.silver { border-left: 6px solid silver; }
.bronze { border-left: 6px solid #cd7f32; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    margin: 100px auto;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    text-align: center;
}

.modal img {
    width: 100%;
}
</style>

</head>
<body>

<header>
    <b>№35 Мектеп-лицейі</b>
</header>

<div class="menu">
    <button onclick="openPage('home')">Басты бет</button>
    <button onclick="openPage('rating')">Үздіктер</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
    <h1>Басты бет</h1>
    <p>Мектеп сайты</p>
</div>

<!-- RATING -->
<div id="rating" class="page">

    <h2>🏆 Үздік оқушылар</h2>

    <!-- GOLD -->
    <div class="item gold" onclick="showDiploma('d1.jpg')">🥇 Оқушы 1</div>
    <div class="item gold" onclick="showDiploma('d2.jpg')">🥇 Оқушы 2</div>
    <div class="item gold">🥇 Оқушы 3</div>

    <!-- SILVER -->
    <div class="item silver" onclick="showDiploma('d3.jpg')">🥈 Оқушы 4</div>
    <div class="item silver">🥈 Оқушы 5</div>
    <div class="item silver">🥈 Оқушы 6</div>
    <div class="item silver">🥈 Оқушы 7</div>

    <!-- BRONZE -->
    <div class="item bronze">🥉 Оқушы 8</div>
    <div class="item bronze">🥉 Оқушы 9</div>
    <div class="item bronze">🥉 Оқушы 10</div>

    <h2>👨‍🏫 Үздік мұғалімдер</h2>

    <div class="item" onclick="showDiploma('t1.jpg')">Мұғалім 1</div>
    <div class="item">Мұғалім 2</div>
    <div class="item" onclick="showDiploma('t2.jpg')">Мұғалім 3</div>
    <div class="item">Мұғалім 4</div>
    <div class="item">Мұғалім 5</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content">
        <h3>Диплом</h3>
        <img id="diplomaImg">
    </div>
</div>

<script>
function openPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* MODAL */
function showDiploma(img){
    document.getElementById("modal").style.display = "block";
    document.getElementById("diplomaImg").src = img;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
