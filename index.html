<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:url("school.jpg") center/cover no-repeat fixed;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
z-index:-1;
}

.container{
max-width:1100px;
margin:40px auto;
background:white;
border-radius:20px;
padding:25px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.header img{
width:40px;
border-radius:50%;
}

/* ГЛАВНАЯ */
.home{
text-align:center;
padding:30px;
}

.home img{
width:120px;
margin-bottom:10px;
}

/* КНОПКИ */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:20px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:25px;
cursor:pointer;
font-size:16px;
color:white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

.bilim{background:#4CAF50;}
.maksat{background:#2196F3;}
.uzdik{background:#000;}
.safe{background:#f44336;}
.sport{background:#ff9800;}

/* СТРАНИЦЫ */
.page{display:none;}
.active{display:block;}

/* ВИДЕО */
.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:20px;
}

.videos iframe{
width:100%;
height:160px;
border-radius:10px;
}

/* ФОТО */
.images{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.images img{
width:100%;
border-radius:12px;
}

/* РЕЙТИНГ */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-top:20px;
}

.card{
padding:12px;
border-radius:12px;
background:#f1f1f1;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
background:black;
color:white;
transform:scale(1.05);
}

/* МОДАЛ */
.modal{
display:none;
position:fixed;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

.modal img{
display:block;
margin:60px auto;
max-width:500px;
width:90%;
}

.arrow{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
}

.left{left:20px;}
.right{right:20px;}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header" onclick="openPage('home')">
<img src="logo.jpg">
<h3>№35 Мектеп-лицейі</h3>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="home">
<img src="logo.jpg">
<h1>№35 Мектеп-лицейі</h1>
<p>Білім мен жетістік мекені</p>

<div class="menu">
<button class="btn bilim" onclick="openPage('bilim')">📘 Білім</button>
<button class="btn maksat" onclick="openPage('maksat')">🎯 Бір мақсат</button>
<button class="btn uzdik" onclick="openPage('rating')">🏆 Үздіктер</button>
<button class="btn safe" onclick="openPage('safe')">🛡 Қауіпсіздік</button>
<button class="btn sport" onclick="openPage('sport')">⚽ Спорт</button>
</div>

</div>

</div>

<!-- БІЛІМ -->
<div id="bilim" class="page">
<h2>📘 Білім</h2>
<div class="images">
<img src="bilim.jpg">
</div>
</div>

<!-- БІР МАҚСАТ -->
<div id="maksat" class="page">
<h2>🎯 Бір мақсат</h2>
<div class="videos">
<iframe src="https://www.youtube.com/embed/G7MI7YPqEhY"></iframe>
<iframe src="https://www.youtube.com/embed/_4A4fcuPQq0"></iframe>
<iframe src="https://www.youtube.com/embed/L0bstXl4kiY"></iframe>
</div>
</div>

<!-- ҚАУІПСІЗДІК -->
<div id="safe" class="page">
<h2>🛡 Қауіпсіз мектеп</h2>
<div class="videos">
<iframe src="https://www.youtube.com/embed/s6GVbAE_uqE"></iframe>
<iframe src="https://www.youtube.com/embed/sbnnTlA8HVQ"></iframe>
<iframe src="https://www.youtube.com/embed/HaLxqOs3hLA"></iframe>
</div>
</div>

<!-- СПОРТ -->
<div id="sport" class="page">
<h2>⚽ Спорт</h2>
<div class="images">
<img src="sport1.jpg">
<img src="sport2.jpg">
</div>
</div>

<!-- ҮЗДІКТЕР -->
<div id="rating" class="page">
<h2>🏆 Үздік оқушылар</h2>

<div class="cards">
<div class="card" onclick="openGallery('uldana')">Тәліпова Ұлдана</div>
<div class="card" onclick="openGallery('nuray')">Сәдуақас Нұрай</div>
<div class="card" onclick="openGallery('akerke')">Шерімқожа Ақерке</div>
<div class="card" onclick="openGallery('nurislam')">Мейрамбеков Нұрислам</div>
<div class="card" onclick="openGallery('merei')">Ақбергенова Мерей</div>
</div>

</div>

</div>

<!-- МОДАЛ -->
<div id="modal" class="modal" onclick="closeImg()">
<span class="arrow left" onclick="prevImg(event)">❮</span>
<span class="arrow right" onclick="nextImg(event)">❯</span>
<img id="img">
</div>

<script>

/* страницы */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ГАЛЕРЕИ */
let galleries={
uldana:["uldana1.jpeg","uldana2.jpeg","uldana3.jpeg"],
nuray:["nurai.png","nurai2.png"],
akerke:["akerke1.jpeg","akerke2.jpeg"],
nurislam:["nurislam1.jpeg","nurislam2.jpeg"],
merei:["merei1.jpeg","merei2.jpeg"]
};

let current=[],i=0;

function openGallery(name){
current=galleries[name];
i=0;
document.getElementById("modal").style.display="block";
showImg();
}

function showImg(){
document.getElementById("img").src=current[i];
}

function nextImg(e){
e.stopPropagation();
i=(i+1)%current.length;
showImg();
}

function prevImg(e){
e.stopPropagation();
i=(i-1+current.length)%current.length;
showImg();
}

function closeImg(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
