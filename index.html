<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
}

/* HEADER */
header {
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: #f9fafb;
}

.menu button {
    padding: 10px 15px;
    border: none;
    background: #e5e7eb;
    border-radius: 10px;
    cursor: pointer;
}

/* PAGE */
.page { display: none; padding: 20px; }
.active { display: block; }

/* SLIDER */
.slider {
    max-width: 600px;
    margin: 20px auto;
    position: relative;
}

.slide {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 12px;
    display: none;
}

.slide.active {
    display: block;
}

/* ARROWS */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* CONTENT */
.content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
}

/* ITEMS */
.item {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
}

.gold { border-left: 6px solid gold; }
.silver { border-left: 6px solid silver; }
.bronze { border-left: 6px solid #cd7f32; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    top: 0;
}

.modal img {
    display: block;
    margin: 80px auto;
    max-width: 500px; /* фикс размер */
    width: 90%;
    height: auto;
    border-radius: 10px;
}
</style>

</head>
<body>

<header>
    <b>№35 Мектеп-лицейі</b>
</header>

<div class="menu">
    <button onclick="openPage('home')">Басты бет</button>
    <button onclick="openPage('rating')">Үздіктер</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

    <h2 style="text-align:center;">№35 Мектеп-лицейі</h2>

    <div class="slider">
        <img src="photo1.jpg" class="slide active">
        <img src="photo2.jpg" class="slide">
        <img src="photo3.jpg" class="slide">
        <img src="photo4.jpg" class="slide">

        <button class="prev" onclick="prevSlide()">❮</button>
        <button class="next" onclick="nextSlide()">❯</button>
    </div>

</div>

<!-- RATING -->
<div id="rating" class="page">

    <h2>🏆 Үздік оқушылар</h2>

    <div class="item gold" onclick="openGallery('uldana')">🥇 Тәліпова Ұлдана</div>
    <div class="item gold" onclick="openGallery('nuray')">🥇 Сәдуақас Нұрай</div>

    <div class="item silver" onclick="openGallery('akerke')">🥈 Шерімқожа Ақерке</div>

    <div class="item bronze" onclick="openGallery('nurislam')">🥉 Мейрамбеков Нұрислам</div>
    <div class="item bronze" onclick="openGallery('merei')">🥉 Ақбергенова Мерей</div>

    <h2>👨‍🏫 Үздік мұғалімдер</h2>

    <div class="item" onclick="openGallery('aigerim')">Сағатова Айгерім</div>
    <div class="item" onclick="openGallery('zharyl')">Жарылқасынова Ақмарал</div>
    <div class="item" onclick="openGallery('aizhan')">Жұмабекқызы Айжан</div>

</div>

<!-- GALLERY -->
<div id="gallery" class="modal" onclick="closeGallery()">
    <img id="img">
</div>

<script>
function openPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* SLIDER FIX */
let index = 0;
let slides = document.querySelectorAll(".slide");

function showSlide(i){
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function nextSlide(){
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide(){
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

setInterval(nextSlide, 3000);

/* GALLERY */
let galleries = {
    uldana: ["uldana1.jpeg"],
    nuray: ["nuray1.png"],
    akerke: ["akerke1.jpeg"],
    nurislam: ["nurislam1.jpeg"],
    merei: ["merei1.jpeg"],

    aigerim: ["aigerim1.jpeg"],
    zharyl: ["zharyl1.jpeg"],
    aizhan: ["aizhan1.jpeg"]
};

function openGallery(name){
    document.getElementById("gallery").style.display = "block";
    document.getElementById("img").src = galleries[name][0];
}

function closeGallery(){
    document.getElementById("gallery").style.display = "none";
}
</script>

</body>
</html>
