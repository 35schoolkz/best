<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>

/* ФОН */
body{margin:0;font-family:sans-serif;}
.bg{
position:fixed;width:100%;height:100%;
background:url("school.jpg") center/cover;
filter:blur(6px);z-index:-1;pointer-events:none;
}

/* КОНТЕЙНЕР */
.container{max-width:900px;margin:auto;padding:20px;}

/* HEADER */
.header{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo{width:50px;}

/* МЕНЮ */
.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;}
.menu button{
padding:15px;border:none;border-radius:12px;
background:white;cursor:pointer;
}

/* СЛАЙДЕР */
.slider{position:relative;height:200px;margin:10px 0;}
.slide{
position:absolute;width:100%;height:100%;
object-fit:cover;border-radius:10px;
opacity:0;transition:1s;
}
.slide.active{opacity:1;}

/* СТРАНИЦЫ */
.page{display:none;}
.page.active{display:block;}

/* ФОТО */
.feed img{
width:100%;margin:10px 0;border-radius:10px;
}

/* РЕЙТИНГ */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{
background:white;padding:10px;border-radius:10px;
cursor:pointer;
}
.mini{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:3px;margin-bottom:5px;
}
.mini img{
width:100%;height:60px;object-fit:cover;
border-radius:5px;
}

/* ВИДЕО */
iframe{
width:100%;height:200px;margin:10px 0;border-radius:10px;
}

/* МОДАЛ */
.modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
}
.modal img{
display:block;margin:50px auto;
max-width:90%;
}

/* КОММЕНТ */
input{width:100%;margin:5px 0;padding:10px;}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="header" onclick="openPage('home')">
<img src="logo.jpg" class="logo">
<h2>№35 Мектеп-лицейі</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="menu">
<button onclick="openPage('bilim')">📘 Білім</button>
<button onclick="openPage('maksat')">🎯 Бір мақсат</button>
<button onclick="openPage('rating')">🏆 Үздіктер</button>
</div>

<div class="slider">
<img src="photo1.jpg" class="slide active">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">
</div>

<div class="menu">
<button onclick="openPage('safe')">🛡 Қауіпсіз</button>
<button onclick="openPage('sport')">⚽ Спорт</button>
<button onclick="openPage('comment')">💬 Пікірлер</button>
</div>

</div>

<!-- БІЛІМ -->
<div id="bilim" class="page">
<h2>Білім</h2>
<div id="bilimFeed" class="feed"></div>
</div>

<!-- СПОРТ -->
<div id="sport" class="page">
<h2>Спорт</h2>
<div id="sportFeed" class="feed"></div>
</div>

<!-- ВИДЕО -->
<div id="maksat" class="page">
<h2>Бір мақсат</h2>
<iframe src="https://www.youtube.com/embed/G7MI7YPqEhY"></iframe>
<iframe src="https://www.youtube.com/embed/_4A4fcuPQq0"></iframe>
<iframe src="https://www.youtube.com/embed/L0bstXl4kiY"></iframe>
</div>

<!-- ҚАУІПСІЗ -->
<div id="safe" class="page">
<h2>Қауіпсіз мектеп</h2>
<iframe src="https://www.youtube.com/embed/s6GVbAE_uqE"></iframe>
<iframe src="https://www.youtube.com/embed/sbnnTlA8HVQ"></iframe>
<iframe src="https://www.youtube.com/embed/HaLxqOs3hLA"></iframe>
</div>

<!-- РЕЙТИНГ -->
<div id="rating" class="page">

<h2>Үздік оқушылар</h2>

<div class="cards">

<div class="card" onclick="openGallery('uldana')">
<div class="mini">
<img src="uldana1.jpeg"><img src="uldana2.jpeg"><img src="uldana3.jpeg">
<img src="uldana4.jpeg"><img src="uldana5.jpeg"><img src="uldana6.jpeg">
</div>
Ұлдана
</div>

<div class="card" onclick="openGallery('nuray')">
<div class="mini">
<img src="nurai.png"><img src="nurai2.png"><img src="nurai3.png">
<img src="nurasy1.jpeg"><img src="nurasy2.jpeg"><img src="nurasy3.jpeg">
</div>
Нұрай
</div>

<div class="card" onclick="openGallery('akerke')">
<div class="mini">
<img src="akerke1.jpeg"><img src="akerke2.jpeg"><img src="akerke3.jpeg">
<img src="akerke4.jpeg"><img src="akerke5.jpeg"><img src="akerke6.jpeg">
</div>
Ақерке
</div>

<div class="card" onclick="openGallery('nurislam')">
<div class="mini">
<img src="nurislam1.jpeg"><img src="nurislam2.jpeg"><img src="nurislam3.jpeg">
<img src="nurislam4.jpeg"><img src="nurislam5.jpeg"><img src="nurislam6.jpeg">
</div>
Нұрислам
</div>

<div class="card" onclick="openGallery('merei')">
<div class="mini">
<img src="merei1.jpeg"><img src="merei2.jpeg"><img src="merei3.jpeg">
<img src="merei4.jpeg"><img src="merei5.jpeg"><img src="merei6.jpeg">
</div>
Мерей
</div>

</div>

<h2>Мұғалімдер</h2>

<div class="cards">

<div class="card">
<div class="mini">
<img src="aigerim1.jpeg"><img src="aigerim2.jpeg"><img src="aigerim3.jpeg">
<img src="aigerim4.jpeg"><img src="aigerim5.jpeg"><img src="aigerim6.jpeg">
</div>
Айгерім
</div>

<div class="card">
<div class="mini">
<img src="aizhan1.jpeg"><img src="aizhan2.jpeg"><img src="aizhan3.jpeg">
<img src="aizhan4.jpeg"><img src="aizhan1.jpeg"><img src="aizhan2.jpeg">
</div>
Айжан
</div>

</div>

</div>

<!-- ПІКІР -->
<div id="comment" class="page">
<h2>Пікір</h2>
<div id="comments"></div>
<input id="name">
<input id="text">
<button onclick="addComment()">Жіберу</button>
</div>

</div>

<div id="modal" class="modal" onclick="closeImg()">
<img id="img">
</div>

<script>

/* ВКЛАДКИ */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* СЛАЙДЕР */
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* ФОТО */
let b="";
for(let i=1;i<=19;i++){b+=`<img src="bilim${i}.jpg">`}
bilimFeed.innerHTML=b;

let s="";
for(let i=1;i<=10;i++){s+=`<img src="sport${i}.jpeg">`}
sportFeed.innerHTML=s;

/* ГАЛЕРЕЯ */
let galleries={
uldana:["uldana1.jpeg","uldana2.jpeg","uldana3.jpeg","uldana4.jpeg","uldana5.jpeg","uldana6.jpeg"],
nuray:["nurai.png","nurai2.png","nurai3.png","nurasy1.jpeg","nurasy2.jpeg","nurasy3.jpeg"],
akerke:["akerke1.jpeg","akerke2.jpeg","akerke3.jpeg","akerke4.jpeg","akerke5.jpeg","akerke6.jpeg"],
nurislam:["nurislam1.jpeg","nurislam2.jpeg","nurislam3.jpeg","nurislam4.jpeg","nurislam5.jpeg","nurislam6.jpeg"],
merei:["merei1.jpeg","merei2.jpeg","merei3.jpeg","merei4.jpeg","merei5.jpeg","merei6.jpeg"]
};

function openGallery(name){
modal.style.display="block";
img.src=galleries[name][0];
}

function closeImg(){
modal.style.display="none";
}

</script>

</body>
</html>
