<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Мектеп</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
    margin: 0;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: white;
}

.menu button {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    cursor: pointer;
}

.page { display: none; padding: 20px; }
.active { display: block; }

.item {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    top: 0;
}

.modal img {
    display: block;
    margin: 80px auto;
    max-width: 500px;
    width: 90%;
}
</style>
</head>

<body>

<div class="menu">
    <button onclick="openPage('home')">Басты бет</button>
    <button onclick="openPage('rating')">Үздіктер</button>
</div>

<div id="home" class="page active">
    <h2>Басты бет</h2>
</div>

<div id="rating" class="page">

<h2>Үздік оқушылар</h2>

<div class="item" onclick="openGallery('uldana')">Тәліпова Ұлдана</div>
<div class="item" onclick="openGallery('nuray')">Сәдуақас Нұрай</div>
<div class="item" onclick="openGallery('akerke')">Шерімқожа Ақерке</div>
<div class="item" onclick="openGallery('nurislam')">Мейрамбеков Нұрислам</div>
<div class="item" onclick="openGallery('merei')">Ақбергенова Мерей</div>

<h2>Үздік мұғалімдер</h2>

<div class="item" onclick="openGallery('aigerim')">Сағатова Айгерім</div>
<div class="item" onclick="openGallery('aigul')">Сулейменова Айгүл</div>
<div class="item" onclick="openGallery('zharyl')">Жарылқасынова Ақмарал</div>
<div class="item" onclick="openGallery('korganbay')">Қорғанбай Жансая</div>
<div class="item" onclick="openGallery('aizhan')">Жұмабекқызы Айжан</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
    <img id="img">
</div>

<script>
function openPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ГАЛЕРЕИ ПОД ТВОИ ФАЙЛЫ */
let galleries = {

uldana: [
"uldana1.jpeg","uldana2.jpeg","uldana3.jpeg","uldana4.jpeg"
],

nuray: [
"nurai.png","nurai2.png","nurai3.png",
"nurasy11.jpeg","nurasy12.jpeg"
],

akerke: [
"akerke1.jpeg","akerke2.jpeg","akerke3.jpeg"
],

nurislam: [
"nurislam1.jpeg","nurislam2.jpeg","nurislam3.jpeg"
],

merei: [
"merei1.jpeg","merei2.jpeg","merei3.jpeg"
],

aigerim: [
"aigerim1.jpeg","aigerim2.jpeg","aigerim3.jpeg"
],

aigul: [
"sul1.jpeg","sul2.jpeg","sul3.jpeg"
],

zharyl: [
"zharyl1.jpeg","zharyl2.jpeg","zharyl3.jpeg"
],

korganbay: [
"korganbay1.jpeg","korganbay2.jpeg"
],

aizhan: [
"aizhan1.jpeg","aizhan2.jpeg","aizhan3.jpeg"
]

};

let i = 0;
let current = [];

function openGallery(name){
    current = galleries[name];
    i = 0;
    document.getElementById("modal").style.display = "block";
    show();
}

function show(){
    document.getElementById("img").src = current[i];
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
