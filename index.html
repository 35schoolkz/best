<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
}

/* 🔥 ФОН */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("school.jpg") center/cover no-repeat;
    filter: blur(8px);
    z-index: -1;
}

/* 🔥 ЦЕНТРАЛЬНЫЙ БЛОК */
.container {
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* HEADER */
header{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

/* MENU */
.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.menu button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#e5e7eb;
    cursor:pointer;
}

/* HERO */
.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:28px;
    margin-bottom:10px;
}

.hero p{
    color:#555;
}

/* SLIDER */
.slider{
    margin-top:20px;
    position:relative;
}

.slide{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    display:none;
}

.slide.active{display:block;}

.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:black;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

.dots{
    text-align:center;
    margin-top:10px;
}

.dot{
    width:10px;
    height:10px;
    background:#ccc;
    border-radius:50%;
    display:inline-block;
    margin:5px;
}

.dot.active{background:black;}
</style>

</head>

<body>

<!-- ФОН -->
<div class="bg"></div>

<div class="container">

<header>№35 Мектеп-лицейі</header>

<div class="menu">
<button onclick="openPage('home')">Басты бет</button>
<button onclick="openPage('rating')">Үздіктер</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="hero">
<h1>Қош келдіңіздер</h1>
<p>Білім мен жетістік мекені</p>
</div>

<div class="slider">
<img src="photo1.jpg" class="slide active">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">

<div class="nav prev" onclick="prevSlide()">❮</div>
<div class="nav next" onclick="nextSlide()">❯</div>

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

</div>

</div>

<script>
let i=0;
let slides=document.querySelectorAll(".slide");

function show(n){
slides.forEach(s=>s.classList.remove("active"));
slides[n].classList.add("active");
}

function nextSlide(){i=(i+1)%slides.length;show(i);}
function prevSlide(){i=(i-1+slides.length)%slides.length;show(i);}
</script>

</body>
</html>
