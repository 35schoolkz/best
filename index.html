<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:url("school.jpg") center/cover no-repeat fixed;
}

/* фон */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
z-index:-1;
}

/* контейнер */
.container{
max-width:1100px;
margin:40px auto;
background:white;
border-radius:20px;
padding:25px;
}

/* header */
.header{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.header img{
width:40px;
border-radius:50%;
}

/* главная */
.home{
text-align:center;
padding:30px;
}

.home img{
width:120px;
margin-bottom:10px;
}

/* кнопка */
.btn{
padding:10px 18px;
background:black;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* страницы */
.page{display:none;}
.active{display:block;}

/* рейтинг */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-top:20px;
}

.card{
padding:12px;
border-radius:12px;
background:#f1f1f1;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
background:black;
color:white;
transform:scale(1.05);
}

/* модал */
.modal{
display:none;
position:fixed;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

.modal img{
display:block;
margin:60px auto;
max-width:500px;
width:90%;
border-radius:10px;
}

/* стрелки */
.arrow{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
}

.left{left:20px;}
.right{right:20px;}

</style>

</head>

<body>

<div class="container">

<div class="header" onclick="openPage('home')">
<img src="logo.jpg">
<h3>№35 Мектеп-лицейі</h3>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="home">
<img src="logo.jpg">
<h1>№35 Мектеп-лицейі</h1>
<p>Білім мен жетістік мекені</p>
<button class="btn" onclick="openPage('rating')">Үздіктер</button>
</div>
</div>

<!-- RATING -->
<div id="rating" class="page">

<h2>🏆 Үздік оқушылар</h2>

<div class="cards">

<div class="card" onclick="openGallery('uldana')">Тәліпова Ұлдана</div>
<div class="card" onclick="openGallery('nuray')">Сәдуақас Нұрай</div>
<div class="card" onclick="openGallery('akerke')">Шерімқожа Ақерке</div>
<div class="card" onclick="openGallery('nurislam')">Мейрамбеков Нұрислам</div>
<div class="card" onclick="openGallery('merei')">Ақбергенова Мерей</div>
<div class="card" onclick="openGallery('aigerim')">Сағатова Айгерім</div>
<div class="card" onclick="openGallery('aizhan')">Жұмабекқызы Айжан</div>
<div class="card" onclick="openGallery('zharyl')">Жарылқасынова Ақмарал</div>

</div>

</div>

</div>

<!-- МОДАЛ -->
<div id="modal" class="modal" onclick="closeImg()">
<span class="arrow left" onclick="prevImg(event)">❮</span>
<span class="arrow right" onclick="nextImg(event)">❯</span>
<img id="img">
</div>

<script>

/* страницы */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ГАЛЕРЕИ (ВСЕ ТВОИ ФОТКИ) */
let galleries = {

uldana:[
"uldana1.jpeg","uldana2.jpeg","uldana3.jpeg","uldana4.jpeg",
"uldana5.jpeg","uldana6.jpeg","uldana7.jpeg","uldana8.jpeg",
"uldana9.jpeg","uldana10.jpeg","uldana11.jpeg","uldana12.jpeg",
"uldana13.jpeg","uldana14.jpeg","uldana15.jpeg"
],

nuray:[
"nurai.png","nurai2.png","nurai3.png"
],

akerke:[
"akerke1.jpeg","akerke2.jpeg","akerke3.jpeg","akerke4.jpeg",
"akerke5.jpeg","akerke6.jpeg","akerke7.jpeg","akerke8.jpeg","akerke9.jpeg"
],

nurislam:[
"nurislam1.jpeg","nurislam2.jpeg","nurislam3.jpeg","nurislam4.jpeg",
"nurislam5.jpeg","nurislam6.jpeg","nurislam7.jpeg","nurislam8.jpeg",
"nurislam9.jpeg","nurislam10.jpeg","nurislam11.jpeg"
],

merei:[
"merei1.jpeg","merei2.jpeg","merei3.jpeg","merei4.jpeg",
"merei5.jpeg","merei6.jpeg","merei7.jpeg","merei8.jpeg",
"merei9.jpeg","merei10.jpeg","merei11.jpeg","merei12.jpeg","merei13.jpeg"
],

aigerim:[
"aigerim1.jpeg","aigerim2.jpeg","aigerim3.jpeg","aigerim4.jpeg",
"aigerim5.jpeg","aigerim6.jpeg"
],

aizhan:[
"aizhan1.jpeg","aizhan2.jpeg","aizhan3.jpeg","aizhan4.jpeg"
],

zharyl:[
"zharyl1.jpeg","zharyl2.jpeg","zharyl3.jpeg","zharyl4.jpeg"
]

};

let current = [];
let index = 0;

function openGallery(name){
current = galleries[name];
index = 0;
document.getElementById("modal").style.display="block";
showImg();
}

function showImg(){
document.getElementById("img").src = current[index];
}

function nextImg(e){
e.stopPropagation();
index = (index + 1) % current.length;
showImg();
}

function prevImg(e){
e.stopPropagation();
index = (index - 1 + current.length) % current.length;
showImg();
}

function closeImg(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
