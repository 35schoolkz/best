<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Мектеп</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f8f5f0;
    color: #222;
}

header {
    background: white;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px;
}

.hero-text {
    max-width: 500px;
}

.hero h1 {
    font-size: 40px;
}

.hero-images img {
    width: 120px;
    border-radius: 15px;
    margin: 5px;
}

.section {
    padding: 50px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.news {
    display: flex;
    gap: 20px;
}

.news img {
    width: 300px;
    border-radius: 10px;
}

.comment-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #d4a373;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>
<body>

<header>
    <h2>🏫 Менің мектебім</h2>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>Зияткерлік мектептері</h1>
        <p>Бұл мектеп оқушыларға сапалы білім береді</p>
    </div>

    <div class="hero-images">
        <img src="https://picsum.photos/100?1">
        <img src="https://picsum.photos/100?2">
        <img src="https://picsum.photos/100?3">
    </div>
</section>

<section class="section">
    <h2>Жаңалықтар</h2>

    <div class="news">
        <img src="https://picsum.photos/300/200">
        <div>
            <p>📌 Жаңа кабинет ашылды</p>
            <p>📌 Мектеп жарысы өтті</p>
            <p>📌 Оқушылар жетістікке жетті</p>
        </div>
    </div>
</section>

<section class="section">
    <h2>Мүмкіндіктер</h2>

    <div class="cards">
        <div class="card">📘 Сапалы білім</div>
        <div class="card">💻 IT сабақтар</div>
        <div class="card">🏆 Жетістіктер</div>
        <div class="card">🌍 Халықаралық бағдарлама</div>
        <div class="card">📊 Даму жүйесі</div>
        <div class="card">👨‍🏫 Мұғалімдер</div>
    </div>
</section>

<section class="section">
    <h2>💬 Пікірлер</h2>

    <div class="comment-box">
        <input id="name" placeholder="Атыңыз">
        <textarea id="text" placeholder="Пікір жазыңыз"></textarea>
        <button onclick="addComment()">Жіберу</button>

        <div id="comments"></div>
    </div>
</section>

<script>
function addComment() {
    let name = document.getElementById("name").value;
    let text = document.getElementById("text").value;

    let div = document.createElement("div");
    div.innerHTML = "<b>" + name + ":</b> " + text;

    document.getElementById("comments").appendChild(div);

    document.getElementById("name").value = "";
    document.getElementById("text").value = "";
}
</script>

</body>
</html>
