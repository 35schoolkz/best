<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body{margin:0;font-family:sans-serif;}

.bg{
position:fixed;width:100%;height:100%;
background:url("school.jpg") center/cover;
filter:blur(6px);z-index:-1;
}

.container{max-width:900px;margin:auto;padding:20px;}

.header{display:flex;gap:10px;align-items:center;cursor:pointer;}
.logo{width:50px}

/* кнопки */
.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;}
.menu button{
padding:15px;border:none;border-radius:12px;
background:white;cursor:pointer;
}

/* slider */
.slider{position:relative;height:200px;}
.slide{
position:absolute;width:100%;height:100%;
object-fit:cover;opacity:0;transition:1s;
}
.slide.active{opacity:1}

/* страницы */
.page{display:none}
.page.active{display:block}

/* рейтинг */
.rating-box{
background:white;
padding:20px;
border-radius:20px;
max-width:600px;
margin:auto;
text-align:center;
}

.rank{
padding:12px;
margin:6px 0;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.rank:hover{transform:scale(1.05)}

.gold{background:linear-gradient(90deg,#FFD700,#fff)}
.silver{background:linear-gradient(90deg,#C0C0C0,#fff)}
.bronze{background:linear-gradient(90deg,#CD7F32,#fff)}

/* галерея */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.modal img{
max-width:90%;
border-radius:10px;
}

.controls{
margin-top:10px;
display:flex;
gap:10px;
}

.controls button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="header" onclick="openPage('home')">
<img src="logo.jpg" class="logo">
<h2>№35 Мектеп-лицейі</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="menu">
<button onclick="openPage('rating')">🏆 Үздіктер</button>
<button onclick="openPage('bilim')">📘 Білім</button>
<button onclick="openPage('sport')">⚽ Спорт</button>
</div>

<div class="slider">
<img src="photo1.jpg" class="slide active">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">
</div>

</div>

<!-- РЕЙТИНГ -->
<div id="rating" class="page">

<div class="rating-box">

<h2>🏆 Үздік оқушылар</h2>

<div class="rank gold" onclick="openGallery('uldana')">🥇 Тәліпова Ұлдана</div>
<div class="rank gold" onclick="openGallery('nuray')">🥇 Сәдуақас Нұрай</div>

<div class="rank silver" onclick="openGallery('akerke')">🥈 Ақерке</div>
<div class="rank silver" onclick="openGallery('merei')">🥈 Мерей</div>

<div class="rank bronze" onclick="openGallery('nurislam')">🥉 Нұрислам</div>

<h2>👩‍🏫 Мұғалімдер</h2>

<div class="rank" onclick="openGallery('aigerim')">Айгерім</div>
<div class="rank" onclick="openGallery('aizhan')">Айжан</div>

</div>

</div>

<!-- ГАЛЕРЕЯ -->
<div id="modal" class="modal">
<img id="img">

<div class="controls">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
<button onclick="closeGallery()">❌</button>
</div>
</div>

</div>

<script>

/* вкладки */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* slider */
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* ВСЕ ФОТКИ 🔥 */
let galleries={

uldana:[
"uldana1.jpeg","uldana2.jpeg","uldana3.jpeg",
"uldana4.jpeg","uldana5.jpeg","uldana6.jpeg","uldana7.jpeg"
],

nuray:[
"nurai.png","nurai2.png","nurai3.png",
"nurasy1.jpeg","nurasy2.jpeg","nurasy3.jpeg",
"nurasy4.jpeg","nurasy5.jpeg"
],

akerke:[
"akerke1.jpeg","akerke2.jpeg","akerke3.jpeg",
"akerke4.jpeg","akerke5.jpeg","akerke6.jpeg","akerke7.jpeg"
],

nurislam:[
"nurislam1.jpeg","nurislam2.jpeg","nurislam3.jpeg",
"nurislam4.jpeg","nurislam5.jpeg","nurislam6.jpeg","nurislam7.jpeg"
],

merei:[
"merei1.jpeg","merei2.jpeg","merei3.jpeg",
"merei4.jpeg","merei5.jpeg","merei6.jpeg","merei7.jpeg"
],

aigerim:[
"aigerim1.jpeg","aigerim2.jpeg","aigerim3.jpeg",
"aigerim4.jpeg","aigerim5.jpeg","aigerim6.jpeg"
],

aizhan:[
"aizhan1.jpeg","aizhan2.jpeg","aizhan3.jpeg",
"aizhan4.jpeg","aizhan5.jpeg"
]

};

let current=[];
let index=0;

function openGallery(name){
current=galleries[name];
index=0;
modal.style.display="flex";
img.src=current[index];
}

function next(){
index=(index+1)%current.length;
img.src=current[index];
}

function prev(){
index=(index-1+current.length)%current.length;
img.src=current[index];
}

function closeGallery(){
modal.style.display="none";
}

</script>

</body>
</html>
