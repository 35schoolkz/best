<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
    color: #222;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 50px;
    margin-right: 10px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px;
}

.hero img {
    width: 90%;
    max-width: 700px;
    border-radius: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 15px;
    padding: 40px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    padding: 40px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
}

/* COMMENTS */
.comment-box {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

/* MOBILE */
@media(max-width:700px){
    .grid {grid-template-columns:1fr;}
    .gallery {grid-template-columns:1fr;}
}
</style>

</head>
<body>

<header>
    <div class="logo">
        <img src="logo.jpg">
        <b>№35 Мектеп-лицейі</b>
    </div>
</header>

<section class="hero">
    <h1>Зияткерлік мектептері</h1>
    <p>Сапалы білім мен даму</p>
    <img src="photo1.jpg">
</section>

<section class="grid">
    <div class="card">Ақылды оқыту</div>
    <div class="card">Қауіпсіз мектеп</div>
    <div class="card">Бір мақсат</div>
    <div class="card">Спорт</div>
</section>

<section class="gallery">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
</section>

<section class="comment-box">
    <h2>Пікірлер</h2>
    <input id="name" placeholder="Атыңыз">
    <textarea id="text" placeholder="Пікір"></textarea>
    <button onclick="addComment()">Жіберу</button>

    <div id="list"></div>
</section>

<script>
function addComment(){
    let name=document.getElementById("name").value;
    let text=document.getElementById("text").value;

    let div=document.createElement("div");
    div.innerHTML="<b>"+name+":</b> "+text;

    document.getElementById("list").appendChild(div);
}
</script>

</body>
</html>
