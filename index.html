<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
    text-align: center;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 50px;
    margin-right: 10px;
}

/* SLIDER */
.slider {
    position: relative;
    max-width: 800px;
    margin: 40px auto;
}

.slide {
    width: 100%;
    border-radius: 15px;
    display: none;
}

.slide.active {
    display: block;
    animation: fade 0.6s;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* CARDS */
.grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 15px;
    padding: 40px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    padding: 40px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
}

/* COMMENTS */
.comment-box {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

/* MOBILE */
@media(max-width:700px){
    .grid {grid-template-columns:1fr;}
    .gallery {grid-template-columns:1fr;}
}
</style>

</head>
<body>

<header>
    <div class="logo">
        <img src="logo.jpg">
        <b>№35 Мектеп-лицейі</b>
    </div>
</header>

<!-- SLIDER -->
<div class="slider">
    <img src="photo1.jpg" class="slide active">
    <img src="photo2.jpg" class="slide">
    <img src="photo3.jpg" class="slide">
    <img src="photo4.jpg" class="slide">

    <button class="prev" onclick="prev()">❮</button>
    <button class="next" onclick="next()">❯</button>
</div>

<h2>МЕКТЕП ТУРАЛЫ</h2>

<div class="grid">
    <div class="card">Ақылды оқыту</div>
    <div class="card">Қауіпсіз мектеп</div>
    <div class="card">Бір мақсат</div>
    <div class="card">Спорт</div>
</div>

<div class="gallery">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
</div>

<div class="comment-box">
    <h2>Пікірлер</h2>
    <input id="name" placeholder="Атыңыз">
    <textarea id="text" placeholder="Пікір"></textarea>
    <button onclick="addComment()">Жіберу</button>

    <div id="list"></div>
</div>

<script>
let i = 0;
let slides = document.querySelectorAll(".slide");

function show(n) {
    slides.forEach(s => s.classList.remove("active"));
    slides[n].classList.add("active");
}

function next() {
    i = (i + 1) % slides.length;
    show(i);
}

function prev() {
    i = (i - 1 + slides.length) % slides.length;
    show(i);
}

setInterval(next, 3000);

function addComment(){
    let name=document.getElementById("name").value;
    let text=document.getElementById("text").value;

    let div=document.createElement("div");
    div.innerHTML="<b>"+name+":</b> "+text;

    document.getElementById("list").appendChild(div);
}
</script>

</body>
</html>
