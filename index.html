<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>№35 Мектеп-лицейі</title>

<style>
body{margin:0;font-family:sans-serif}

/* фон */
.bg{
position:fixed;width:100%;height:100%;
background:url("school.jpg") center/cover;
filter:blur(6px);z-index:-1;
}

/* контейнер */
.container{max-width:900px;margin:auto;padding:20px}

/* header */
.header{display:flex;gap:10px;align-items:center;cursor:pointer}
.logo{width:50px}

/* меню */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin:10px 0;
}

.menu button{
padding:15px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
}

/* СЛАЙДЕР */
.slider{
position:relative;
overflow:hidden;
height:230px;
border-radius:12px;
}

.slides{
display:flex;
transition:0.5s;
height:100%;
}

.slides img{
min-width:100%;
height:100%;
object-fit:cover;
}

/* кнопки */
.left,.right{
position:absolute;
top:50%;
transform:translateY(-50%);
background:white;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
}

.left{left:10px}
.right{right:10px}

/* страницы */
.page{display:none}
.page.active{display:block}

/* рейтинг */
.rating-box{
background:white;
padding:20px;
border-radius:20px;
max-width:600px;
margin:auto;
text-align:center;
}

.rank{
padding:12px;
margin:6px 0;
border-radius:10px;
font-weight:600;
}

.gold{background:gold}
.silver{background:silver}
.bronze{background:#cd7f32;color:white}

/* видео */
iframe{
width:100%;
height:200px;
margin:10px 0;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="header" onclick="openPage('home')">
<img src="logo.jpg" class="logo">
<h2>№35 Мектеп-лицейі</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="menu">
<button onclick="openPage('bilim')">📘 Оқу жетістігі</button>
<button onclick="openPage('maksat')">🎯 Бір мақсат, бір мүдде</button>
<button onclick="openPage('rating')">🏆 Оқушы белсенділігі</button>
</div>

<div class="menu">
<button onclick="openPage('safe')">🛡 Тәрбие жұмысы</button>
<button onclick="openPage('teachers')">👩‍🏫 Мұғалім сапасы</button>
<button onclick="openPage('comment')">💬 Пікірлер</button>
</div>

</div>

<!-- БІЛІМ -->
<div id="bilim" class="page">
<h2>📘 Оқу жетістігі</h2>

<div class="slider">
<div class="slides bilim">
<!-- автоматически -->
</div>

<button class="left" onclick="slide('bilim',-1)">⬅</button>
<button class="right" onclick="slide('bilim',1)">➡</button>
</div>

</div>

<!-- ТӘРБИЕ -->
<div id="safe" class="page">
<h2>🛡 Тәрбие жұмысы</h2>

<div class="slider">
<div class="slides tar">
<img src="tar1.jpg"><img src="tar2.jpg"><img src="tar3.jpg">
<img src="tar4.jpg"><img src="tar5.jpg"><img src="tar6.jpg">
<img src="tar7.jpg"><img src="tar8.jpg"><img src="tar9.jpg">
<img src="tar10.jpg"><img src="tar11.jpg">
</div>

<button class="left" onclick="slide('tar',-1)">⬅</button>
<button class="right" onclick="slide('tar',1)">➡</button>
</div>

<!-- ВИДЕО НЕ ТРОГАЕМ -->
<iframe src="https://www.youtube.com/embed/s6GVbAE_uqE"></iframe>
<iframe src="https://www.youtube.com/embed/sbnnTlA8HVQ"></iframe>

</div>

<!-- МҰҒАЛІМ -->
<div id="teachers" class="page">
<h2>👩‍🏫 Мұғалім сапасы</h2>

<div class="slider">
<div class="slides mug">
<img src="mug1.jpg"><img src="mug2.jpg"><img src="mug3.jpg">
<img src="mug4.jpg"><img src="mug5.jpg"><img src="mug6.jpg">
<img src="mug7.jpg"><img src="mug8.jpg">
</div>

<button class="left" onclick="slide('mug',-1)">⬅</button>
<button class="right" onclick="slide('mug',1)">➡</button>
</div>

</div>

<!-- РЕЙТИНГ -->
<div id="rating" class="page">
<div class="rating-box">
<h2>🏆 Оқушы белсенділігі</h2>
<div class="rank gold">🥇 Тәліпова Ұлдана</div>
<div class="rank silver">🥈 Ақерке</div>
<div class="rank bronze">🥉 Нұрислам</div>
</div>
</div>

</div>

<script>

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

let sliders={bilim:0,tar:0,mug:0};

function slide(type,dir){
let container=document.querySelector(`.${type}`);
let total=container.children.length;

sliders[type]+=dir;

if(sliders[type]<0) sliders[type]=total-1;
if(sliders[type]>=total) sliders[type]=0;

container.style.transform=`translateX(-${sliders[type]*100}%)`;
}

/* билим автозагрузка */
let b="";
for(let i=1;i<=19;i++){b+=`<img src="bilim${i}.jpg">`}
document.querySelector(".bilim").innerHTML=b;

</script>

</body>
</html>
